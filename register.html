<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroRush Register</title>
    <meta name="keywords" content="">
    <meta name="description" content="">

    <link rel="icon" type="image/png" href="image/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
   

    <main class="login-page-main">
        <section class="login-hero-section">
            <div class="login-shell">
                <div class="login-card reveal">
                    <div class="login-card-top">
                        <a href="index.html" class="login-brand">
                            <img src="image/logo.png" alt="HydroRush logo">
                        </a>
                        <h2>Register</h2>
                    </div>

                    <form class="login-form" action="#" method="post">
                        <label class="login-field">
                            <input type="text" name="fullname" placeholder="Full Name" required>
                        </label>

                        <label class="login-field">
                            <input type="email" name="email" placeholder="Email Address" required>
                        </label>

                        <label class="login-field login-field-password">
                            <input type="password" id="registerPassword" name="password" placeholder="Password" required>
                            <button type="button" class="password-toggle" id="registerPasswordToggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </label>

                        <label class="login-field login-field-password">
                            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                        </label>

                        <div class="login-form-meta">
                            <label class="login-checkbox">
                                <input type="checkbox" name="terms" required>
                                <span>I agree to the <a href="#" class="login-link">Terms of Service</a> and <a href="#" class="login-link">Privacy Policy</a></span>
                            </label>
                        </div>

                        <button type="submit" class="login-submit">Register</button>
                    </form>

                    <div class="login-divider">
                        <span>Or register with</span>
                    </div>

                    <div class="login-socials">
                        <a href="#" class="login-social login-social-facebook" aria-label="Register with Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="login-social login-social-google" aria-label="Register with Google"><i class="fa-brands fa-google"></i></a>
                        <a href="#" class="login-social login-social-x" aria-label="Register with X"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#" class="login-social login-social-apple" aria-label="Register with Apple"><i class="fa-brands fa-apple"></i></a>
                    </div>

                    <p class="login-register-note">
                        Already have an account?
                        <a href="login.html" class="login-link">Login</a>
                    </p>
                </div>
            </div>
        </section>
    </main>


    <button type="button" class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>
    <script src="jss/main.js"></script>
</body>
</html>
